name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, crystal: latest }
          - { os: macos-latest, crystal: latest }
          - { os: macos-15-intel, crystal: latest }

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{matrix.crystal}}

      - name: Cache shards
        uses: actions/cache@v5
        with:
          path: |
            lib
            bin/ameba
          key: ${{ runner.os }}-shards-${{ hashFiles('**/shard.lock') }}

      # ---- Install bubblewrap for Linux
      - name: Install bubblewrap (apt)
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      # ---- Build debug release and run tests on ALL platforms

      - name: Install shards
        run: shards check || shards install

      - name: Setup debug environment (Linux)
        run: mkdir -p bin/debug

      - name: Build Debug
        run: SHARDS_BIN_PATH=bin/debug shards build --debug

      - name: Run tests (Linux)
        run: crystal spec -Dtest

      # ---- Run formatting and lint tests on Linux

      - name: Check formatting (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: crystal tool format; git diff --exit-code src

      - name: Run static code analysis (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: bin/ameba src/

      # ---- Build releases on all platforms

      - name: Setup release environment
        run: mkdir -p bin/release

      - name: Build Release
        run: SHARDS_BIN_PATH=bin/release shards --production build --release

      # Use it to run a command
      - name: Run "sandboxer check"
        if: ${{ runner.os != 'Windows' }}
        run: "bin/release/sandboxer check"

      # Integration test: run a real sandboxed command via sandbox-exec on macOS.
      - name: Run sandboxed command via sandbox-exec (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          echo '{"read_only_paths":["/usr/bin","/usr/lib"],"allow_network":false}' > /tmp/test_policy.json
          bin/release/sandboxer run --policy /tmp/test_policy.json -- /usr/bin/find /usr/bin -maxdepth 1 -name 'g*'

      # Enable unprivileged user namespaces — required for bwrap.
      # Ubuntu 23.10+ sets kernel.apparmor_restrict_unprivileged_userns=1
      # by default, which blocks bwrap regardless of unprivileged_userns_clone.
      # Both are set here for compatibility across Ubuntu versions.
      - name: Enable user namespaces (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 \
            || echo "::warning::kernel.apparmor_restrict_unprivileged_userns not available on this kernel"
          sudo sysctl -w kernel.unprivileged_userns_clone=1 \
            || echo "::warning::kernel.unprivileged_userns_clone not available on this kernel"

      # Integration test: run a real sandboxed command through bwrap on Linux.
      - name: Run sandboxed command via bwrap (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo '{"read_only_paths":["/usr/bin","/usr/lib","/usr/lib64","/lib","/lib64"],"allow_network":true}' > /tmp/test_policy.json
          bin/release/sandboxer run --policy /tmp/test_policy.json -- /usr/bin/find /usr/bin -maxdepth 1 -name 'g*'
